name: run main.py

on:
  schedule:
    - cron: '0 5 * * *'
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: checkout repo content
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      # НОВЫЙ ШАГ: Установка TOR и принудительное переключение на молдавские IP-адреса
      - name: setup TOR proxy (Moldova exit nodes)
        run: |
          sudo apt-get update
          sudo apt-get install -y tor
          # Настраиваем TOR для выхода строго через узлы Молдовы (код md)
          echo "ExitNodes {MD}" | sudo tee -a /etc/tor/torrc
          echo "StrictNodes 1" | sudo tee -a /etc/tor/torrc
          sudo service tor restart
          # Обязательно даем TOR 10 секунд, чтобы поднять сетевые мосты
          sleep 10
      - name: check tor
        run: |
          curl --socks5-hostname 127.0.0.1:9050 https://check.torproject.org/api/ip
      - name: install python packages
        run: |
          python -m pip install --upgrade pip
          # Доустанавливаем socks-расширения, чтобы Python умел ходить через TOR-туннель
          pip install "curl-cffi[socks]"
          pip install -r requirements.txt

      - name: execute py script
        env:
          SOME_SECRET: ${{ secrets.SOME_SECRET }}
          # Перенаправляем весь входящий и исходящий трафик скрипта в локальный TOR-прокси
          HTTP_PROXY: "socks5://127.0.0.1:9050"
          HTTPS_PROXY: "socks5://127.0.0.1:9050"
        run: python cron.py

      - name: commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add -A

          # если нет изменений — ничего не делаем
          git diff --cached --quiet && exit 0

          git commit -m "updated logs"
          git push
